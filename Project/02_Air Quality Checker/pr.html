<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Air Quality Checker</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f2f5;
    }

    .container {
      width: 420px;
      background: #ffffff;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 26px;
      font-weight: 700;
      color: #222;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      outline: none;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #0057ff;
      color: white;
      font-size: 17px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #0043d8;
    }

    .aqi-box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      color: white;
      text-align: center;
      font-size: 28px;
      font-weight: 800;
    }

    /* Color Categories */
    .good {
      background: #009966;
    }

    .moderate {
      background: #ffde33;
      color: black;
    }

    .usg {
      background: #ff9933;
    }

    .unhealthy {
      background: #cc0033;
    }

    .very-unhealthy {
      background: #660099;
    }

    .hazardous {
      background: #7e0023;
    }

    .details {
      margin-top: 20px;
      font-size: 16px;
      line-height: 1.6;
    }

    .details p {
      margin-bottom: 8px;
    }

    .health-msg {
      margin-top: 15px;
      padding: 12px;
      background: #f3f3f3;
      border-left: 6px solid #444;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🌫 Air Quality Checker</h1>

    <input type="text" id="city" placeholder="Enter city name (e.g., Delhi)" />
    <button onclick="checkAQI()">Check AQI</button>

    <div id="result"></div>
  </div>

  <script>
    function getAQILevel(aqi) {
      if (aqi <= 50) return { level: "good", msg: "Air quality is good. Enjoy outdoor activities." };
      if (aqi <= 100) return { level: "moderate", msg: "Moderate air quality. Sensitive people should reduce outdoor activity." };
      if (aqi <= 150) return { level: "usg", msg: "Unhealthy for sensitive groups. Wear a mask if needed." };
      if (aqi <= 200) return { level: "unhealthy", msg: "Air quality is unhealthy. Avoid long outdoor exposure." };
      if (aqi <= 300) return { level: "very-unhealthy", msg: "Very unhealthy. Limit outdoor activities." };
      return { level: "hazardous", msg: "Hazardous air! Stay indoors and use an air purifier." };
    }

    async function checkAQI() {
      const city = document.getElementById("city").value.trim();
      const result = document.getElementById("result");

      if (!city) {
        result.innerHTML = "<p>Please enter a city name.</p>";
        return;
      }

      result.innerHTML = "<p>Loading...</p>";

      const token = "YOUR_TOKEN"; // ← Put your API key here
      const url = `https://api.waqi.info/feed/${city}/?token=${token}`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.status !== "ok") {
          result.innerHTML = "<p>City not found or API limit reached.</p>";
          return;
        }

        const aqi = data.data.aqi;

        const pm25 = data.data.iaqi.pm25?.v ?? "N/A";
        const pm10 = data.data.iaqi.pm10?.v ?? "N/A";
        const o3 = data.data.iaqi.o3?.v ?? "N/A";
        const no2 = data.data.iaqi.no2?.v ?? "N/A";
        const so2 = data.data.iaqi.so2?.v ?? "N/A";

        const { level, msg } = getAQILevel(aqi);

        result.innerHTML = `
          <div class="aqi-box ${level}">
            AQI: ${aqi}
          </div>

          <div class="details">
            <p><b>PM2.5:</b> ${pm25}</p>
            <p><b>PM10:</b> ${pm10}</p>
            <p><b>Ozone (O₃):</b> ${o3}</p>
            <p><b>Nitrogen Dioxide (NO₂):</b> ${no2}</p>
            <p><b>Sulfur Dioxide (SO₂):</b> ${so2}</p>
          </div>

          <div class="health-msg">
            <b>Health Message:</b><br>${msg}
          </div>
        `;
      } catch (err) {
        result.innerHTML = "<p>Error fetching data. Check your internet or API key.</p>";
      }
    }
  </script>

</body>

</html>
