<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script2.js" defer></script>
  </head>
  <body>
    <div class="card">
      <div class="search">
        <input
          type="text"
          name="input"
          placeholder="Enter City Name"
          id="input"
        />
        <button><img src="./Assets/search.png" width="16" alt="" /></button>
      </div>
      <div class="message"></div>
      <div class="weather hide">
        <img src="./Assets/clear.png" class="weather-icon" width="100" alt="" />
        <h1 class="temp"></h1>
        <h2 class="city"></h2>
        <div class="details">
          <div class="col">
            <img src="./Assets/humidity.png" width="50" alt="" />
            <div>
              <p class="humidity"></p>
              <p>humidity</p>
            </div>
          </div>
          <div class="col">
            <img src="./Assets/wind.png" width="50" alt="" />
            <div>
              <p class="wind"></p>
              <p>Wind Speed</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
