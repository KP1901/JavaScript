<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      class Animal {
        constructor(name, species) {
          this.name = name;
          this.species = species;
        }
        describe() {
          console.log(`I am ${this.name}, a ${this.species}`);
        }
        static kingdom() {
          return "Animalia";
        }
      }
      class Bird extends Animal {
        constructor(name, species, canFly) {
          super(name, species);
          this.canFly = canFly;
        }
        describe() {
          if (this.canFly) {
            console.log(`I am ${this.name}, a ${this.species}, I can fly`);
          } else {
            console.log(`I am ${this.name}, a ${this.species}, I can not fly`);
          }
        }
        flyStatus() {
          if (this.canFly) {
            console.log("I can Fly");
          } else {
            console.log("I can not Fly");
          }
        }
      }
      class Penguin extends Bird {
        constructor(name) {
          super(name, "Penguin", false);
        }
        describe() {
          super.describe();
          console.log("I love swimming");
        }
      }
      let parrot = new Bird("Polly", "Parrot", true);

      let pingu = new Penguin("Pingu");
      console.log(parrot);


      pingu.describe();
    </script>
  </body>
</html>
