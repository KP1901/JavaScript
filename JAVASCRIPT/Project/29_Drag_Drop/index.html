<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drag & Drop</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div id="left">
        <div class="list" draggable="true" data-index="0">
          <img src="" alt="" />
          <span>1</span>
        </div>
        <div class="list" draggable="true" data-index="1">
          <img src="" alt="" />
          <span>2</span>
        </div>
        <div class="list" draggable="true" data-index="2">
          <img src="" alt="" />
          <span>3</span>
        </div>
        <div class="list" draggable="true" data-index="3">
          <img src="" alt="" />
          <span>4</span>
        </div>
      </div>
      <div id="right"></div>
    </div>
  </body>
</html>
