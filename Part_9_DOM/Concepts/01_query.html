<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Page Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      #product {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 10px;
        max-width: 300px;
      }
      select {
        margin-top: 10px;
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <h1>Product Viewer</h1>
    <p>Choose a product to see it in the URL and load its details:</p>

    <select id="productSelector">
      <option value="">-- Select a Product --</option>
      <option value="42">Red Shoes</option>
      <option value="99">Blue T-Shirt</option>
      <option value="123">Black Hat</option>
    </select>

    <div id="product">
      <h2 id="productName">No product selected</h2>
      <p id="productPrice"></p>
    </div>

    <script>
      // Fake "database"
      const products = {
        42: { name: "Red Shoes", price: 50 },
        99: { name: "Blue T-Shirt", price: 20 },
        123: { name: "Black Hat", price: 15 },
      };

      const productNameEl = document.getElementById("productName");
      const productPriceEl = document.getElementById("productPrice");
      const selector = document.getElementById("productSelector");

      // Function to load product details from query string
      function loadProductFromQuery() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        if (id && products[id]) {
          const product = products[id];
          productNameEl.textContent = product.name;
          productPriceEl.textContent = "Price: $" + product.price;
          selector.value = id;
        } else {
          productNameEl.textContent = "No product selected";
          productPriceEl.textContent = "";
          selector.value = "";
        }
      }

      // When user selects a product, update query string
      selector.addEventListener("change", () => {
        const id = selector.value;
        if (id) {
          // Update URL without reloading the page
          const newUrl = window.location.pathname + "?id=" + id;
          history.pushState(null, "", newUrl);
        } else {
          history.pushState(null, "", window.location.pathname);
        }
        loadProductFromQuery();
      });

      // Load product when page first opens
      loadProductFromQuery();

      // Handle browser back/forward buttons
      window.addEventListener("popstate", loadProductFromQuery);
    </script>
  </body>
</html>
