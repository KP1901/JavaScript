<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Shop</title>
    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }
      .product {
        border: 1px solid #ccc;
        padding: 10px;
        margin: 10px;
        display: inline-block;
        width: 200px;
        text-align: center;
      }
      .product img {
        width: 100px;
        height: 100px;
        object-fit: cover;
      }
      button {
        margin-top: 5px;
        padding: 5px 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Our Products</h1>

    <div id="productList"></div>

    <script>
      // Array of products (like from a database)
      const products = [
        {
          id: 101,
          name: "Smartphone",
          price: 499,
          img: "https://via.placeholder.com/100?text=Phone",
        },
        {
          id: 102,
          name: "Laptop",
          price: 899,
          img: "https://via.placeholder.com/100?text=Laptop",
        },
        {
          id: 103,
          name: "Headphones",
          price: 149,
          img: "https://via.placeholder.com/100?text=Headphones",
        },
        {
          id: 104,
          name: "Smartwatch",
          price: 199,
          img: "https://via.placeholder.com/100?text=Watch",
        },
      ];

      const productList = document.getElementById("productList");

      // Render product cards
      products.forEach((product) => {
        const div = document.createElement("div");
        div.className = "product";
        div.innerHTML = `
        <img src="${product.img}" alt="${product.name}">
        <h3>${product.name}</h3>
        <p>Price: $${product.price}</p>
        <a href="product.html?id=${product.id}"><button>View Details</button></a>
      `;
        productList.appendChild(div);
      });
    </script>
  </body>
</html>
