<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Rock Paper Scissor Game!</h1>
    <h2>Choose Your Move:</h2>
    <div class="bottons">
      <button type="button" id="rock">&#9994;</button>
      <button type="button" id="paper">&#9995;</button>
      <button type="button" id="scissor">&#9996;</button>
    </div>
    <div class="result">
      <div class="status"></div>
      <div class="scores">
        <div>Player Score: <span id="player-score">0</span></div>
        <div>Computer Score: <span id="computer-score">0</span></div>
      </div>
      <div class="restart-game">
        <a href="index.html">Restart Game</a>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
