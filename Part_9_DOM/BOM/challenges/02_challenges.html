<!-- 
 Challenge 2: Browser Info

Task:
Use the navigator object to display a sentence like:
"You are using Chrome on Windows in English."

Requirements:

Show browser name, version, OS, and language.

Dynamically insert it into the DOM.

-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>BOM challenge 2s</h2>
      <p>We will cover a BOM challenge in this</p>
      <div class="window-size">
        <div id="height"></div>
        <div id="width"></div>
      </div>
    </div>
    <script>
      function showBrowserDetails() {
        let navigatorDetails = navigator.userAgent; // on which platfrom using
        let browserName = "unknown";
        let lang = navigator.language;
        let version = navigator.platform; // return Win32/Win64
        let os = "unknown";

        if (navigatorDetails.includes("Edg")) {
          browserName = "Edge";
        } else if (navigatorDetails.includes("Chrome")) {
          browserName = "Chrome";
        } else if (navigatorDetails.includes("Safari")) {
          browserName = "Safari";
        } else if (navigatorDetails.includes("Firefox")) {
          browserName = "Firefox";
        }
        if (version.includes("Win")) {
          os = "Windows";
        }
        console.log(
          `you are using ${browserName} on ${version} on ${os} in ${lang}`
        );
        console.log(navigatorDetails);
      }
      showBrowserDetails();
    </script>
  </body>
</html>
