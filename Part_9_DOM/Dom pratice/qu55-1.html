<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Show Error Below Input</title>
    <style>
      :root {
        --error-color: #b00020;
        --radius: 8px;
        --gap: 8px;
        --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue",
          Arial;
      }

      body {
        font-family: var(--font);
        padding: 32px;
        background: #f7f7fb;
        color: #111;
      }

      form {
        max-width: 420px;
        background: #fff;
        padding: 20px;
        border-radius: var(--radius);
        box-shadow: 0 6px 18px rgba(12, 12, 20, 0.06);
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }

      input[type="text"],
      input[type="email"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 1rem;
        box-sizing: border-box;
      }

      input[type="text"][aria-invalid="true"] {
        border-color: var(--error-color);
        outline: 3px solid rgba(176, 0, 32, 0.06);
      }

      .error {
        margin-top: 6px;
        font-size: 0.9rem;
        color: var(--error-color);
        opacity: 0;
        transform: translateY(-2px);
        transition: opacity 0.15s ease, transform 0.15s ease;
        display: block;
      }

      .error.visible {
        opacity: 1;
      }

      button {
        margin-top: 14px;
        padding: 10px 14px;
        font-size: 1rem;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: #2563eb;
        color: white;
      }
    </style>
  </head>
  <body>
    <form id="demoForm" novalidate>
      <div>
        <label for="fullname">Full name</label>
        <input
          id="fullname"
          name="fullname"
          type="text"
          autocomplete="name"
          aria-describedby="fullname-error"
          aria-invalid="false"
          placeholder="Enter your full name"
        />
        <span
          id="fullname-error"
          class="error"
          role="alert"
          aria-live="assertive"
        ></span>
      </div>
      <div>
        <label for="email">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          aria-describedby="email-error"
          aria-invalid="false"
          placeholder="Enter your Email"
        />
        <span
          id="email-error"
          class="error"
          role="alert"
          aria-live="assertive"
        ></span>
      </div>
      <button type="submit">Submit</button>
    </form>

    <script src="qu55-1.js"></script>
  </body>
</html>
