<!-- challenge 4: Show Current URL -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BOM Challenge 3</title>
  </head>
  <body>
    <h1>Challenge 4: Show Current URL</h1>
    <p id="output"></p>

    <script>
      let currentUrl = window.location.href;
      document.querySelector(
        "#output"
      ).innerHTML = `<a href=${currentUrl} target=_blank>${currentUrl}</a>`;
    </script>
  </body>
</html>
