<!-- 
 
Screen Dimensions

Print window.innerWidth, window.innerHeight, window.outerWidth, window.outerHeight in console.

Display them in the DOM and update when the window is resized.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>BOM challenges</h2>
      <p>We will cover a BOM challenge in this</p>
      <div class="window-size">
        <div id="height"></div>
        <div id="width"></div>
      </div>
    </div>
    <script>
      console.log(window.innerWidth);
      console.log(window.innerHeight);
      console.log(window.outerWidth);
      console.log(window.outerHeight);

      function getCurrentWindowSize() {
        let getHeight = window.innerHeight;
        let getWidth = window.innerWidth;
        let currentWindowHeight = document.getElementById("height");
        let currentWindowWidth = document.getElementById("width");
        currentWindowHeight.textContent = getHeight;
        currentWindowWidth.textContent = getWidth;
      }
      //   ✅ This makes sure your <div id="height"> and <div id="width"> elements exist before your function tries to update them (It waits until the page is fully loaded)
      window.addEventListener("load", getCurrentWindowSize);
      //   ✅ This is why your width and height update dynamically when you resize the window.
      window.addEventListener("resize", getCurrentWindowSize);

      //   The load event executes when the entire page is fully loaded, and the function stores the current window size. Then, when I resize the window, the resize event executes, which updates the values in the DOM.
    </script>
  </body>
</html>
