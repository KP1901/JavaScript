<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="script_01.js" defer></script>
    <style>
      body {
        position: relative;
      }
      .circle {
        width: 30px;
        height: 30px;
        background: red;
        border-radius: 50%;
      }
      .box {
        position: absolute;
        width: 300px;
        height: 300px;
        top: 50%;
        left: 50%;
        background: #000;
        transform: translate(-50%, 50%);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="circle"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
