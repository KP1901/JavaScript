<!DOCTYPE html>
<html>
  <head>
    <title>querySelector Example with Theory</title>
  </head>
  <body>
    <!-- Elements with IDs, classes, and tags -->
    <h1 id="heading">Hello World!</h1>
    <p id="para" class="text">This is a paragraph.</p>
    <p class="text">Another paragraph with same class.</p>
    <input type="text" id="username" value="Kiran" />
    <button id="btn">Click Me</button>

    <script>
      const headingElement = document.querySelector("#heading");
      headingElement.textContent = "Changed with querySelector!";

      const firstPara = document.querySelector(".text");
      firstPara.style.background = "brown";

      const firstPTag = document.querySelector("p");
      firstPTag.style.background = "red";

      const inputField = document.querySelector("input[type='text']");
      console.log(inputField.value);

      const attributeaccess = document.querySelector("p[id='para']");
      console.log(inputField.value);
      attributeaccess.style.background = "green";

      const btn = document.querySelector("button");
      btn.addEventListener("click", () => {
        document.querySelector("p").textContent = "Button clicked";
      });
    </script>
  </body>
</html>
