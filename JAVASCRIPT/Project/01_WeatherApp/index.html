<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather-App</title>
    <link rel="shortcut icon" href="./Assets/snow.png" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="media.css" />
    <script src="script.js" type="module" defer></script>
  </head>
  <body>
    <div class="weather-app">
      <div class="weather-app-container">
        <form class="weather-input-form">
          <div class="search-bar">
            <input
              type="text"
              name="city"
              id="cityInput"
              placeholder="Enter City"
            />
          </div>
          <button type="submit" class="search-icon">
            <img width="15px" src="./Assets/search.png" alt="search-image" />
          </button>
        </form>
        <div id="message"></div>
        <div class="weather-hide-container">
          <div class="temperature-details">
            <img
              width="35px"
              id="weather-img"
              src="./Assets/clear.png"
              alt=""
            />
            <div class="temperature">30°C</div>
            <div class="city">Dubai</div>
          </div>
          <div class="weather-details">
            <div class="humidity-detail">
              <img width="35px" src="./Assets/humidity.png" alt="" />
              <div>
                <div class="humidity">21%</div>
                <span>humidity</span>
              </div>
            </div>
            <div class="wind-detail">
              <img src="./Assets/wind.png" alt="" />
              <div>
                <div class="wind">23 km/hr</div>
                <span>Wind Speed</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
