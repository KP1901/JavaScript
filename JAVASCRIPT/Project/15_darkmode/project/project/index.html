<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiran Portfolio</title>

    <style>
      /* =========================
   THEME VARIABLES
========================= */

      :root {
        --bg: #81a9e0;
        --text: #000;
        --nav-bg: #fff;
        --primary: #000;
        --card-bg: #4b4b623b;
      }
      body.dark {
        --bg: #fff;
        --text: #000;
        --nav-bg: #000;
        --primary: #fff;
        --card-bg: #000;
      }

      /* =========================
   GLOBAL STYLES
========================= */

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        transition: 0.4s;
      }

      .container {
        width: 90%;
        max-width: 1100px;
        margin: auto;
        padding: 60px 0;
      }

      /* =========================
   NAVBAR
========================= */

      nav {
        background: var(--nav-bg);
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
      }

      nav h2 {
        color: var(--primary);
      }

      .toggle-btn {
        cursor: pointer;
        font-size: 20px;
        background: none;
        border: none;
      }

      /* =========================
   HERO
========================= */

      .hero {
        text-align: center;
        padding: 100px 20px;
      }

      .hero h1 {
        font-size: 40px;
        margin-bottom: 20px;
      }

      .hero span {
        color: var(--primary);
      }

      /* =========================
   PROJECTS
========================= */

      .projects {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }

      .card {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 12px;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      /* =========================
   FOOTER
========================= */

      footer {
        text-align: center;
        padding: 40px 0;
      }
    </style>
  </head>

  <body>
    <nav>
      <h2>Kiran</h2>
      <button class="toggle-btn" id="themeToggle">🌙</button>
    </nav>

    <section class="hero container">
      <h1>Hello, I'm <span>Kiran</span></h1>
      <p>Frontend Developer | JavaScript Learner</p>
    </section>

    <section class="container">
      <h2 style="margin-bottom: 20px">Projects</h2>
      <div class="projects">
        <div class="card">
          <h3>Project 1</h3>
          <p>Image Slider Website</p>
        </div>
        <div class="card">
          <h3>Project 2</h3>
          <p>Password Strength Checker</p>
        </div>
        <div class="card">
          <h3>Project 3</h3>
          <p>Form Validation System</p>
        </div>
      </div>
    </section>

    <footer>© 2026 Kiran Portfolio</footer>

    <script>

      //   const body = document.body;

      //   // Load saved theme

      //   //     body.classList.add("dark");

      //   //   }

      //   // Toggle theme
      //   toggleBtn.addEventListener("click", () => {
      //     body.classList.toggle("dark");

      //     // if (body.classList.contains("dark")) {
      //     //   toggleBtn.textContent = "☀️";
      //     //   localStorage.setItem("theme", "dark");
      //     // } else {
      //     //   toggleBtn.textContent = "🌙";
      //     //   localStorage.setItem("theme", "light");
      //     // }
      //   });
      const toggleBtn = document.getElementById("themeToggle");

      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        toggleBtn.textContent = "🌙";
      }


      toggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
          toggleBtn.textContent = "☀️";
          localStorage.setItem("theme", "dark");
        } else {
          toggleBtn.textContent = "🌙";
          localStorage.setItem("theme", "light");
        }
      });
    </script>
  </body>
</html>
