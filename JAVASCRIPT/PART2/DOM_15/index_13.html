<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Bubbling vs Capturing</title>
  </head>
  <body>
    <div id="grandparent" style="padding: 30px; background: #f39c12">
      Grandparent
      <div id="parent" style="padding: 30px; background: #e67e22">
        Parent
        <button id="child" style="padding: 15px">Child Button</button>
      </div>
    </div>

    <script>
      /*
      🔥 Event Flow in JavaScript:
      1. Capturing phase (trickles down: document → html → body → grandparent → parent → child)
      2. Target phase (the actual element clicked)
      3. Bubbling phase (bubbles up: child → parent → grandparent → body → html → document)

      By default → addEventListener works in BUBBLING phase.
      To use capturing phase → pass { capture: true }.
      */

      // Bubbling phase listeners (default)
      document
        .getElementById("grandparent")
        .addEventListener("click", function () {
          console.log("Bubbling: Grandparent clicked");
        });

      document.getElementById("parent").addEventListener("click", function () {
        console.log("Bubbling: Parent clicked");
      });

      document.getElementById("child").addEventListener("click", function () {
        console.log("Bubbling: Child clicked");
      });

      // Capturing phase listeners
      document.getElementById("grandparent").addEventListener(
        "click",
        function () {
          console.log("Capturing: Grandparent clicked");
        },
        { capture: true },
      );

      document.getElementById("parent").addEventListener(
        "click",
        function () {
          console.log("Capturing: Parent clicked");
        },
        { capture: true },
      );

      document.getElementById("child").addEventListener(
        "click",
        function () {
          console.log("Capturing: Child clicked");
        },
        { capture: true },
      );

      /*
      👉 Try clicking the Child Button:
         Console order will be:
         1. Capturing: Grandparent clicked
         2. Capturing: Parent clicked
         3. Capturing: Child clicked
         4. Bubbling: Child clicked
         5. Bubbling: Parent clicked
         6. Bubbling: Grandparent clicked
      */

      //   Example of stopping bubbling
      // document.getElementById("child").addEventListener("click", function (e) {
      //   console.log("Child clicked → stopping bubbling now!");
      //   e.stopPropagation(); // prevents event from reaching parent/grandparent in bubbling phase
      // });

      //   or use event delegation
      const grandParent = document.getElementById("grandparent");
      grandParent.addEventListener("click", function (e) {
        if ((e.target.id = "parent")) {
          console.log("parent clicked → stopping bubbling now!");
          e.stopPropagation();
        }
      });

      /*
      ✅ Event Delegation:
      Instead of attaching listeners to each button, we attach ONE listener to parent/grandparent.
      The event bubbles up, and we check which element triggered it (e.target).
      */

      /*
        The document object and its methods are not part of javascript programming langue.These methods are provided by borwsers Web Api
        
        these methods cannot be used in outside the broswer (like we cant use in NOde.js)

        these methods are the provide at run time from web API
      */
    </script>
  </body>
</html>
