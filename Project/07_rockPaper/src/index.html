<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body
    class="bg-[#5c5c631a] flex items-center text-2xl justify-center font-sans flex-col h-screen text-center"
  >
    <h1 class="font-bold">Rock Paper Scissor Game</h1>
    <h2 class="font-bold pt-4">Choose Your Move:</h2>
    <div class="logos flex gap-3 pt-4">
      <div
        class="logo w-fit flex justify-center items-center p-4 cursor-pointer rounded-xl bg-orange-400"
        id="rock"
      >
        <img
          src="./assets/hand_10921374.png"
          class="object-contain"
          width="40"
          height="40"
          alt=""
        />
      </div>
      <div
        class="logo w-fit flex justify-center items-center p-4 cursor-pointer rounded-xl bg-blue-500"
        id="paper"
      >
        <img
          src="./assets/hand-paper.png"
          class="object-contain"
          width="40"
          height="40"
          alt=""
        />
      </div>
      <div
        class="logo w-fit flex justify-center items-center p-4 cursor-pointer rounded-xl bg-green-400"
        id="scissor"
      >
        <img
          src="./assets/scissors.png"
          class="object-contain"
          width="40"
          height="40"
          alt=""
        />
      </div>
    </div>

    <div class="result-container flex flex-col pt-3">
      <div id="result" class="font-bold text-xl py-3"></div>
      <div class="status flex gap-3">
        <h2 class="text-xl font-bold">
          Your score : <span id="player-score" class="text-blue-500">0</span>
        </h2>
        <h2 class="text-xl font-bold">
          Computer score :
          <span id="computer-score" class="text-orange-500">0</span>
        </h2>
      </div>
      <div class="restart-game my-5">
        <a href="index.html" id="reset-game" class="hidden font-black text-2xl"
          >Restart Game!</a
        >
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
