<!DOCTYPE html>
<html>
  <head>
    <title>querySelector Example with Theory</title>
  </head>
  <body>
    <!-- Elements with IDs, classes, and tags -->
    <h1 id="heading">Hello World!</h1>
    <p id="para" class="text">This is a paragraph.</p>
    <p class="text">Another paragraph with same class.</p>
    <input type="text" id="username" value="Kiran" />
    <button id="btn">Click Me</button>

    <script>
      /*
      THEORY:
      --------------------------------------------------------
      1. document.querySelector("CSS Selector")
         → Selects the FIRST element that matches the CSS selector.

      2. Accepts ANY valid CSS selector:
         - "#id" → by id
         - ".class" → by class
         - "tag" → by tag name (p, h1, div, etc.)
         - "div > p" → by hierarchy
         - "input[type='text']","p[id='para']" → by attribute 

      3. Returns:
         - The first matching element object
         - null if no element matches

      4. Differences vs getElementById:
         - getElementById → only works with id (faster, simpler).
         - querySelector → works with ANY CSS selector (more powerful).
    */

      // 1. Select by ID (same as getElementById but using CSS syntax)
      const headingElement = document.querySelector("#heading");
      headingElement.textContent = "Changed with querySelector!";

      // 2. Select by class (first element with .text)
      const firstPara = document.querySelector(".text");
      firstPara.style.color = "blue";

      // 3. Select by tag (first <p>)
      const firstPTag = document.querySelector("p");
      firstPTag.style.fontWeight = "bold";

      // 4. Select input by attribute
      const inputField = document.querySelector("input[type='text']");
      console.log("Input value is:", inputField.value);

      // 5. Example: Button click changes paragraph
      document.querySelector("#btn").addEventListener("click", function () {
        document.querySelector(".text").textContent =
          "Button Clicked! (first .text)";
      });

      // 6. If selector not found → null
      const notFound = document.querySelector(".doesNotExist");
      console.log(notFound); // Output: null
    </script>
  </body>
</html>

<script>
  /*
Notes on querySelector (From Given Code)

1. Definition:
   document.querySelector("CSS Selector") → Selects the first element that matches the CSS selector.

2. Accepts CSS Selectors:
   "#id" → by id
   ".class" → by class
   "tag" → by tag name
   "div > p" → by hierarchy
   "input[type='text']" or "p[id='para']" → by attribute

3. Return Value:
   Returns the first matching element object.
   If no match found → null.

4. Difference vs getElementById:
   getElementById → only works with id (faster, simpler).
   querySelector → works with any CSS selector (more powerful).

5. Uses (from code):
   Change text content → element.textContent
   Change style (color, weight) → element.style.property
   Get input value → element.value
   Attach event → element.addEventListener("click", fn)

6. Properties Used:
   .textContent → get/set text
   .style.color → change text color
   .style.fontWeight → change text bold
   .value → get input field value

7. Method Used:
   .addEventListener("click", fn) → handle button click

Example Actions:
   Change heading text
   Change first paragraph color
   Make first p tag bold
   Get input field value
   Button click changes first .text element
   If selector not found → null
*/
</script>
