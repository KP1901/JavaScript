<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Demo</title>
  </head>
  <body>
    <h1 id="productTitle">Loading product...</h1>
    <p id="productDesc"></p>

    <script>
      // Simulate a product database
      const products = {
        1: {
          name: "Laptop",
          description: "A powerful laptop for work and gaming.",
        },
        2: {
          name: "Smartphone",
          description: "A smartphone with great camera.",
        },
        3: { name: "Headphones", description: "Noise-cancelling headphones." },
      };

      // Get query parameters from URL
      const params = new URLSearchParams(window.location.search);
      const productId = params.get("id"); // Get 'id' from URL

      const titleEl = document.getElementById("productTitle");
      const descEl = document.getElementById("productDesc");

      if (productId && products[productId]) {
        // Display product based on query
        titleEl.innerText = products[productId].name;
        descEl.innerText = products[productId].description;
      } else {
        // Default message if no query or invalid id
        titleEl.innerText = "Select a product to view details.";
        descEl.innerText = "Use the URL with ?id=1, ?id=2, or ?id=3";
      }
      function showProduct(id) {
        const product = products[id];
        if (product) {
          titleEl.innerText = product.name;
          descEl.innerText = product.description;
        }
      }
    </script>
  </body>
</html>
